name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup local.properties with mock API KEY
      run: echo "TMDB_API_TOKEN=mock_api_key_for_ci" > secret.properties

    - name: Run Lint
      run: ./gradlew lintDebug

    - name: Build Debug APK
      run: ./gradlew assembleDebug
