name: CI — Main

on:
  push:
    branches: [ main ]

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ── 1. Lint & code style ────────────────────────────────────────────────────
  lint:
    name: Lint & Code Style
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Write secret.properties
        run: echo "TMDB_API_TOKEN=${{ secrets.TMDB_API_TOKEN }}" > secret.properties

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      - name: Run ktlint
        run: ./gradlew ktlintCheck --continue

      - name: Run Android Lint
        run: ./gradlew lintDebug

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports-${{ github.sha }}
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/ktlint/
          retention-days: 14

  # ── 2. Unit tests + Paparazzi ───────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Write secret.properties
        run: echo "TMDB_API_TOKEN=${{ secrets.TMDB_API_TOKEN }}" > secret.properties

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ github.sha }}
          path: |
            app/build/reports/tests/
            app/build/test-results/
          retention-days: 14

      - name: Upload Paparazzi golden snapshots
        uses: actions/upload-artifact@v4
        with:
          name: paparazzi-snapshots-${{ github.sha }}
          path: app/src/test/snapshots/
          retention-days: 30
          if-no-files-found: ignore

  # ── 3. Static analysis ──────────────────────────────────────────────────────
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Write secret.properties
        run: echo "TMDB_API_TOKEN=${{ secrets.TMDB_API_TOKEN }}" > secret.properties

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      - name: Run detekt
        run: ./gradlew detektDebug --continue

      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report-${{ github.sha }}
          path: app/build/reports/detekt/
          retention-days: 14

  # ── 4. Instrumented tests (emulator) ────────────────────────────────────────
  instrumented-tests:
    name: Instrumented Tests
    runs-on: ubuntu-latest
    # Only run after unit tests pass to save emulator boot time
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Write secret.properties
        run: echo "TMDB_API_TOKEN=${{ secrets.TMDB_API_TOKEN }}" > secret.properties

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      # Enable KVM for hardware acceleration (faster emulator boot on Linux runners)
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: Nexus 6
          target: default
          # Disable animations for reliable UI tests
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: ./gradlew connectedDebugAndroidTest --stacktrace

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results-${{ github.sha }}
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
          retention-days: 14

      - name: Publish instrumented test summary
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'app/build/outputs/androidTest-results/connected/**/*.xml'
          check_name: 'Instrumented Test Results'

  # ── 5. Build debug APK ──────────────────────────────────────────────────────
  build-debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    # Only build after all checks pass
    needs: [ lint, unit-tests, static-analysis ]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Write secret.properties
        run: echo "TMDB_API_TOKEN=${{ secrets.TMDB_API_TOKEN }}" > secret.properties

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK with commit SHA
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/showmate-debug-${{ github.sha }}.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: showmate-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/showmate-debug-${{ github.sha }}.apk
          retention-days: 30

      - name: Add APK download link to summary
        run: |
          echo "## Build artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Debug APK: \`showmate-debug-${{ github.sha }}.apk\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
