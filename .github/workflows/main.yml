name: Main branch CI

on:
  push:
    branches: [ main ]

jobs:
  test-and-build:
    name: Test & Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create secret.properties
        run: |
          echo 'TMDB_API_TOKEN="${{ secrets.TMDB_API_TOKEN }}"' > secret.properties

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            cat > app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "firebase_url": "https://showmate-placeholder-default-rtdb.firebaseio.com",
              "project_id": "showmate-placeholder",
              "storage_bucket": "showmate-placeholder.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                "android_client_info": { "package_name": "com.andrea.showmateapp" }
              },
              "api_key": [{ "current_key": "placeholder" }],
              "services": {}
            }],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-main
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 14

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
