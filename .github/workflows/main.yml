name: Main branch CI

on:
  push:
    branches: [ main ]

jobs:
  test-and-build:
    name: Test & Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create secret.properties
        run: echo 'TMDB_API_TOKEN="NO_TOKEN"' > secret.properties

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            printf '%s\n' \
              '{' \
              '  "project_info": {' \
              '    "project_number": "123456789012",' \
              '    "firebase_url": "https://showmate-app-default-rtdb.firebaseio.com",' \
              '    "project_id": "showmate-app",' \
              '    "storage_bucket": "showmate-app.appspot.com"' \
              '  },' \
              '  "client": [{' \
              '    "client_info": {' \
              '      "mobilesdk_app_id": "1:123456789012:android:abcdef1234567890",' \
              '      "android_client_info": { "package_name": "com.andrea.showmateapp" }' \
              '    },' \
              '    "api_key": [{ "current_key": "placeholder" }],' \
              '    "services": {}' \
              '  }],' \
              '  "configuration_version": "1"' \
              '}' > app/google-services.json
          fi

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest -x processDebugGoogleServices

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-main
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 14
