name: PR checks

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create secret.properties
        run: echo 'TMDB_API_TOKEN="NO_TOKEN"' > secret.properties

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest -x processDebugGoogleServices

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-pr
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7
