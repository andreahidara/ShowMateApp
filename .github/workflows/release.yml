name: Release

# Triggered by pushing a semver tag: git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'   # also matches v1.0.0-rc1, v1.0.0-beta2, etc.

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ── 1. Build + sign release AAB ─────────────────────────────────────────────
  build-release:
    name: Build Signed AAB
    runs-on: ubuntu-latest

    outputs:
      version_name: ${{ steps.version.outputs.name }}
      aab_path: ${{ steps.locate-aab.outputs.path }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history so versionCode can be derived from commit count if needed
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── Secrets ──────────────────────────────────────────────────────────────
      - name: Write secret.properties
        run: echo "TMDB_API_TOKEN=${{ secrets.TMDB_API_TOKEN }}" > secret.properties

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      # ── Extract version from tag ──────────────────────────────────────────────
      - name: Extract version name from tag
        id: version
        run: |
          # Strip the leading 'v': v1.2.3 → 1.2.3
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          echo "name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION_NAME}"

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build release AAB (unsigned)
        run: ./gradlew bundleRelease

      # ── Sign ──────────────────────────────────────────────────────────────────
      - name: Sign AAB
        id: sign-aab
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          alias: ${{ secrets.RELEASE_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.RELEASE_STORE_PASSWORD }}
          keyPassword: ${{ secrets.RELEASE_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: '35.0.0'

      # ── Rename with version ───────────────────────────────────────────────────
      - name: Rename signed AAB
        id: locate-aab
        run: |
          SIGNED_AAB="${{ steps.sign-aab.outputs.signedReleaseFile }}"
          RENAMED="app/build/outputs/bundle/release/showmate-${{ steps.version.outputs.name }}.aab"
          mv "$SIGNED_AAB" "$RENAMED"
          echo "path=${RENAMED}" >> $GITHUB_OUTPUT
          echo "Signed AAB: ${RENAMED}"

      # ── Upload as artifact (accessible even if release job fails) ─────────────
      - name: Upload signed AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: showmate-release-${{ steps.version.outputs.name }}
          path: ${{ steps.locate-aab.outputs.path }}
          retention-days: 90

      # ── Build summary ─────────────────────────────────────────────────────────
      - name: Write build summary
        run: |
          echo "## Release build ${{ steps.version.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.version.outputs.name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| AAB | \`showmate-${{ steps.version.outputs.name }}.aab\` |" >> $GITHUB_STEP_SUMMARY

  # ── 2. Create GitHub Release ─────────────────────────────────────────────────
  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: write   # required to create releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Download the signed AAB produced in the previous job
      - name: Download signed AAB
        uses: actions/download-artifact@v4
        with:
          name: showmate-release-${{ needs.build-release.outputs.version_name }}
          path: release-artifacts/

      # Auto-generate changelog from commits since the previous tag
      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | sed -n '2p')
          CURRENT_TAG="${{ github.ref_name }}"

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found — listing all commits."
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            echo "Changelog: ${PREVIOUS_TAG}..${CURRENT_TAG}"
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREVIOUS_TAG}..HEAD")
          fi

          # Write to a temp file to handle multiline strings safely
          {
            echo "## What's changed"
            echo ""
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "**Full diff:** [\`${PREVIOUS_TAG}\` → \`${CURRENT_TAG}\`](https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${CURRENT_TAG})"
              echo ""
            fi
            echo "$COMMITS"
            echo ""
            echo "---"
            echo "_Built from commit \`${{ github.sha }}\`_"
          } > changelog.md

          echo "Generated changelog:"
          cat changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ShowMate ${{ needs.build-release.outputs.version_name }}
          body_path: changelog.md
          # Pre-release if tag contains a hyphen: v1.0.0-rc1
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-artifacts/showmate-${{ needs.build-release.outputs.version_name }}.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
